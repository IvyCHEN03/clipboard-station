name: Bug report
description: Report something broken or confusing.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Linggan Floating Ball. Please remove private clipboard contents before posting. Do not include API keys, screenshots with private data, local encrypted state, or full provider URLs.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected instead.
      placeholder: The floating bubble disappeared after...
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: macOS 15.5
    validations:
      required: true
  - type: input
    id: build
    attributes:
      label: App version or commit
      placeholder: v0.4.0 or commit SHA
  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - GitHub release zip
        - ./Scripts/install-local.sh
        - swift run
        - Not sure
        - Other
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Floating bubble / menu bar
        - Clipboard capture
        - Screenshot or OCR
        - Spreadsheet capture
        - AI tags
        - Sorting or composer
        - Permissions
        - Packaging or install
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Copy text from...
        3. Click...
    validations:
      required: true
  - type: dropdown
    id: frequency
    attributes:
      label: How often does it happen?
      options:
        - Every time
        - Often
        - Sometimes
        - Happened once
        - Not sure
    validations:
      required: true
  - type: textarea
    id: checks
    attributes:
      label: Checks already tried
      description: Optional. Tell us whether you ran the doctor script, reinstalled, checked Accessibility permission, or verified the release checksum.
      placeholder: |
        - Ran ./Scripts/doctor.sh:
        - Reinstalled with ./Scripts/install-local.sh:
        - Accessibility permission:
        - Release checksum:
  - type: textarea
    id: logs
    attributes:
      label: Diagnostics, screenshots, or logs
      description: Optional. In the app, open Settings and click "复制诊断信息", then paste it here. Please redact private content from screenshots or logs.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed private clipboard contents, API keys, provider secrets, and sensitive screenshots from this report.
          required: true
