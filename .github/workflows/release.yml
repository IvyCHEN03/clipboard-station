name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build release zip
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Show Swift version
        run: swift --version

      - name: Check project
        run: ./Scripts/check-project.sh

      - name: Build zip
        id: build_zip
        run: |
          ZIP_PATH="$(./Scripts/make-release-zip.sh "${GITHUB_REF_NAME}")"
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "checksum_path=$ZIP_PATH.sha256" >> "$GITHUB_OUTPUT"

      - name: Draft release notes
        id: release_notes
        run: |
          NOTES_PATH="$(./Scripts/make-release-notes.sh "${GITHUB_REF_NAME}")"
          echo "notes_path=$NOTES_PATH" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.release_notes.outputs.notes_path }}
          files: |
            ${{ steps.build_zip.outputs.zip_path }}
            ${{ steps.build_zip.outputs.checksum_path }}
          prerelease: true
