<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Linggan Floating Ball workflow preview</title>
  <desc id="desc">A visual workflow showing copied fragments flowing into Linggan Floating Ball, then into filters, a block composer, and a final prompt.</desc>
  <rect width="1200" height="560" rx="36" fill="#F7FBFF"/>
  <rect x="36" y="36" width="1128" height="488" rx="28" fill="white" stroke="#D9E8F6" stroke-width="2"/>

  <circle cx="108" cy="104" r="35" fill="#82CDFB"/>
  <path d="M108 79L118 98L139 104L119 113L108 134L98 114L77 104L98 96L108 79Z" fill="white"/>
  <text x="160" y="96" fill="#1E293B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="700">Linggan Floating Ball</text>
  <text x="160" y="130" fill="#64748B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18">Local-first clipboard station for working across many AI chats</text>

  <g transform="translate(76 188)">
    <rect width="230" height="214" rx="18" fill="#F8FAFC" stroke="#D9E8F6"/>
    <text x="24" y="42" fill="#334155" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700">1. Capture</text>
    <rect x="24" y="70" width="182" height="32" rx="10" fill="#E0F2FE"/>
    <text x="42" y="92" fill="#0369A1" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">Text snippets</text>
    <rect x="24" y="114" width="154" height="32" rx="10" fill="#ECFDF5"/>
    <text x="42" y="136" fill="#047857" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">Screenshots</text>
    <rect x="24" y="158" width="170" height="32" rx="10" fill="#FFF7ED"/>
    <text x="42" y="180" fill="#C2410C" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">Table cells</text>
  </g>

  <path d="M327 295H398" stroke="#93C5FD" stroke-width="5" stroke-linecap="round"/>
  <path d="M388 279L408 295L388 311" stroke="#93C5FD" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(428 188)">
    <rect width="250" height="214" rx="18" fill="#F8FAFC" stroke="#D9E8F6"/>
    <text x="24" y="42" fill="#334155" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700">2. Filter</text>
    <rect x="24" y="70" width="88" height="30" rx="15" fill="#DBEAFE"/>
    <text x="46" y="90" fill="#1D4ED8" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">Today</text>
    <rect x="122" y="70" width="76" height="30" rx="15" fill="#E0E7FF"/>
    <text x="142" y="90" fill="#4338CA" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">3 days</text>
    <rect x="24" y="116" width="78" height="30" rx="15" fill="#DCFCE7"/>
    <text x="43" y="136" fill="#15803D" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">AI</text>
    <rect x="112" y="116" width="108" height="30" rx="15" fill="#FAE8FF"/>
    <text x="132" y="136" fill="#A21CAF" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">workflow</text>
    <rect x="24" y="162" width="128" height="30" rx="15" fill="#FEF3C7"/>
    <text x="44" y="182" fill="#B45309" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">screenshot</text>
  </g>

  <path d="M700 295H771" stroke="#93C5FD" stroke-width="5" stroke-linecap="round"/>
  <path d="M761 279L781 295L761 311" stroke="#93C5FD" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(810 188)">
    <rect width="314" height="214" rx="18" fill="#F8FAFC" stroke="#D9E8F6"/>
    <text x="24" y="42" fill="#334155" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700">3. Compose</text>
    <rect x="24" y="72" width="62" height="46" rx="14" fill="#82CDFB"/>
    <text x="48" y="101" fill="white" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="800">1</text>
    <text x="98" y="101" fill="#64748B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">add bridge text</text>
    <rect x="210" y="72" width="62" height="46" rx="14" fill="#A7F3D0"/>
    <text x="234" y="101" fill="#047857" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="800">2</text>
    <rect x="24" y="140" width="248" height="42" rx="12" fill="#EEF6FF" stroke="#BFDBFE"/>
    <text x="50" y="166" fill="#2563EB" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700">Copy final prompt</text>
  </g>

  <text x="76" y="468" fill="#64748B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17">No cloud sync by default. Local encrypted persistence. Optional AI tags only when configured.</text>
</svg>
